<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Feedback Form</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>User Feedback Form</h1>
    <div id="form-container">
        <form id="feedback-form">
            <label for="name">Name:</label>
        <input type="text" id="name" placeholder="Enter your name">
        <span class="tooltip">Enter your full name</span>
        <label for="email">Email:</label>
        <input type="email" id="email" placeholder="Enter your email">
        <span class="tooltip">Enter your valid email address</span>
        <label for="comments">Comments:</label>
        <textarea id="comments" rows="4" placeholder="Enter feedback"></textarea>
        <span class="tooltip">Share your thoughts</span>
        <button type="submit">Submit</button>
        <p id="validation-message"></p>
        </form>
    </div>
    <h2>Feedback Entries</h2>
    <div id="feedback-display"></div>
    <script src="cp_1.js"></script>
</body>
</html>
